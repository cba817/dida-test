<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商战思维 | 空间增长系统全案诊断</title>
    <meta name="description" content="基于《商战思维》方法论，在线诊断您的企业增长破局点，获取针对性空间增长解决方案。">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ====== 导航栏 ====== -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <div class="logo-icon">⬡</div>
                    <span class="logo-text">空间增长<span class="logo-accent">系统</span></span>
                </div>

                <div class="nav-links">
                    <a href="#" onclick="location.reload()">诊断中心</a>
                    <a href="#packages">增长方案</a>
                    <a href="#case-studies">成功案例</a>
                    <a href="#methodology">方法论</a>
                    <a class="btn btn-primary btn-sm nav-cta" href="javascript:void(0)" onclick="window.openContactModal()">立即预约</a>
                    <button class="theme-toggle" id="themeBtn">🌓</button>
                </div>

                <button class="hamburger" id="hamburgerBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </nav>
        </div>
    </header>

    <!-- ====== 主内容区 ====== -->
    <main id="app">
        <!-- 由 JS 动态渲染 -->
    </main>

    <!-- ====== 页脚 ====== -->
    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>快速导航</h4>
                    <a href="#" onclick="location.reload()">增长诊断</a>
                    <a href="#case-studies">成功案例</a>
                    <a href="#methodology">商战思维课程</a>
                    <a href="javascript:void(0)" onclick="window.openContactModal()">落地咨询服务</a>
                </div>
                <div class="footer-col">
                    <h4>联系我们</h4>
                    <p>📍 地址：中国·深圳市南山区科技园增长大厦 8F</p>
                    <p>📞 电话：400-888-9999</p>
                    <p>📧 邮箱：growth@space-system.com</p>
                    <p style="margin-top:12px;font-size:0.8rem;color:var(--text-dim)">周一至周五 9:00 - 18:00</p>
                </div>
                <div class="footer-col">
                    <h4>扫码预约诊断</h4>
                    <div class="qr-placeholder">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=SpaceGrowthSystem" alt="微信二维码" loading="lazy">
                    </div>
                    <p style="font-size:0.8rem">专业顾问1对1解答</p>
                </div>
            </div>
            <div class="copyright">
                © 2025 空间增长系统 | 设计驱动增长，空间即是销售
            </div>
        </div>
    </footer>

    <!-- ====== 联系表单弹窗 ====== -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal">
            <div class="modal-header">
                <h3>获取专属增长方案</h3>
                <button class="modal-close" aria-label="关闭弹窗">&times;</button>
            </div>

            <!-- 表单 -->
            <form id="leadForm" novalidate>
                <div class="form-group">
                    <label>您的姓名 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="leadName" placeholder="请输入您的姓名" autocomplete="name">
                    <div class="form-error" id="nameError">请填写您的姓名</div>
                </div>

                <div class="form-group">
                    <label>手机号码 <span class="required">*</span></label>
                    <input type="tel" class="form-input" id="leadPhone" placeholder="请输入您的手机号" autocomplete="tel">
                    <div class="form-error" id="phoneError">请填写正确的手机号</div>
                </div>

                <div class="form-group">
                    <label>公司名称</label>
                    <input type="text" class="form-input" id="leadCompany" placeholder="请输入您的公司名称（选填）" autocomplete="organization">
                </div>

                <div class="form-group">
                    <label>备注信息</label>
                    <textarea class="form-input" id="leadNote" rows="3" placeholder="如有其他需求请备注（选填）" style="resize:vertical;min-height:60px"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">提交预约，获取方案 🚀</button>
                <p style="text-align:center;margin-top:12px;font-size:0.75rem;color:var(--text-dim)">我们承诺严格保护您的隐私信息</p>
            </form>

            <!-- 提交成功 -->
            <div class="form-success">
                <div class="form-success-icon">✅</div>
                <h4>提交成功！</h4>
                <p>我们的专业顾问将在24小时内与您联系</p>
                <button class="btn btn-secondary" style="margin-top:20px" onclick="
                    document.getElementById('contactModal').classList.remove('open');
                    document.getElementById('leadForm').style.display = 'block';
                    document.querySelector('.form-success').classList.remove('open');
                    document.getElementById('leadForm').reset();
                ">我知道了</button>
            </div>
        </div>
    </div>

    <!-- ====== 回到顶部 ====== -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

    <!-- ====== JavaScript ====== -->
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
