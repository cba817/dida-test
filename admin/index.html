<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间增长系统 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- ====== 登录页 ====== -->
    <div id="loginPage" class="admin-login-page">
        <div class="admin-login-card">
            <h1>🔐 管理后台</h1>
            <p>空间增长系统 · 内容管理</p>
            <div class="admin-login-error" id="loginError">用户名或密码错误</div>
            <form id="loginForm">
                <div class="admin-form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入管理员用户名" autocomplete="username">
                </div>
                <div class="admin-form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;justify-content:center;padding:10px;font-size:1rem">
                    登 录
                </button>
            </form>
        </div>
    </div>

    <!-- ====== 管理面板 ====== -->
    <div id="adminPanel" class="admin-layout hidden">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2>⚡ 空间增长</h2>
                <p id="sidebarUser">管理员</p>
            </div>
            <nav class="admin-nav">
                <div class="admin-nav-item active" data-tab="site" onclick="switchTab('site')">
                    <span class="nav-icon">⚙️</span>
                    <span>站点设置</span>
                </div>
                <div class="admin-nav-item" data-tab="pains" onclick="switchTab('pains')">
                    <span class="nav-icon">🔴</span>
                    <span>痛点管理</span>
                </div>
                <div class="admin-nav-item" data-tab="packages" onclick="switchTab('packages')">
                    <span class="nav-icon">📦</span>
                    <span>套餐管理</span>
                </div>
                <div class="admin-nav-item" data-tab="cases" onclick="switchTab('cases')">
                    <span class="nav-icon">🏆</span>
                    <span>案例管理</span>
                </div>
                <div class="admin-nav-item" data-tab="leads" onclick="switchTab('leads')">
                    <span class="nav-icon">📋</span>
                    <span>线索管理</span>
                </div>
            </nav>
            <div class="admin-sidebar-footer">
                <button class="admin-logout-btn" onclick="handleLogout()">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="admin-main" id="adminMain">

            <!-- ===== 站点设置 ===== -->
            <section id="tab-site" class="admin-section active">
                <div class="admin-page-header">
                    <div>
                        <h1>⚙️ 站点设置</h1>
                        <div class="admin-subtitle">管理网站 Logo、名称和描述</div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-form-group">
                        <label>网站 Logo</label>
                        <div class="admin-upload-area">
                            <div class="admin-upload-preview" id="logoPreview">
                                <span class="placeholder">⬡</span>
                            </div>
                            <div>
                                <input type="file" id="logoInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
                                <button class="admin-btn" onclick="document.getElementById('logoInput').click()">📁 选择图片</button>
                                <button class="admin-btn admin-btn-primary" id="uploadLogoBtn" onclick="uploadLogo()" disabled>上传</button>
                                <p style="font-size:0.78rem;color:#999;margin-top:6px">支持 JPEG/PNG/GIF/WebP，最大 5MB</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <form id="siteForm">
                        <div class="admin-form-group">
                            <label>网站名称 <span class="required">*</span></label>
                            <input type="text" class="admin-input" id="siteName" placeholder="例如：空间增长系统">
                        </div>
                        <div class="admin-form-row">
                            <div class="admin-form-group">
                                <label>Logo 主文字</label>
                                <input type="text" class="admin-input" id="logoText" placeholder="例如：空间增长">
                            </div>
                            <div class="admin-form-group">
                                <label>Logo 高亮文字</label>
                                <input type="text" class="admin-input" id="logoAccent" placeholder="例如：系统">
                            </div>
                        </div>
                        <div class="admin-form-group">
                            <label>站点描述 <span class="required">*</span></label>
                            <textarea class="admin-textarea" id="siteDescription" rows="3" placeholder="网站 SEO 描述"></textarea>
                        </div>
                        <div style="display:flex;gap:12px;justify-content:flex-end">
                            <button type="submit" class="admin-btn admin-btn-primary">💾 保存设置</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- ===== 痛点管理 ===== -->
            <section id="tab-pains" class="admin-section">
                <div class="admin-page-header">
                    <div>
                        <h1>🔴 痛点管理</h1>
                        <div class="admin-subtitle">管理各驱动类型的诊断痛点内容</div>
                    </div>
                    <button class="admin-btn admin-btn-primary" onclick="openAddPainModal()">➕ 新增痛点</button>
                </div>

                <!-- 驱动类型 Tab -->
                <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
                    <button class="admin-btn admin-btn-primary admin-btn-sm pain-driver-tab active" data-driver="PRODUCT" onclick="switchPainDriver('PRODUCT')">💎 产品驱动型</button>
                    <button class="admin-btn admin-btn-sm pain-driver-tab" data-driver="CHANNEL" onclick="switchPainDriver('CHANNEL')">🌐 渠道依赖型</button>
                    <button class="admin-btn admin-btn-sm pain-driver-tab" data-driver="USER" onclick="switchPainDriver('USER')">❤️ 关系网络型</button>
                </div>

                <div class="admin-card" id="painListContainer">
                    <div class="admin-loading">加载中...</div>
                </div>
            </section>

            <!-- ===== 套餐管理 ===== -->
            <section id="tab-packages" class="admin-section">
                <div class="admin-page-header">
                    <div>
                        <h1>📦 套餐管理</h1>
                        <div class="admin-subtitle">管理增长方案套餐的价格、功能和推荐逻辑</div>
                    </div>
                    <button class="admin-btn admin-btn-primary" onclick="openAddPackageModal()">➕ 新增套餐</button>
                </div>

                <div class="admin-card" id="packageListContainer">
                    <div class="admin-loading">加载中...</div>
                </div>
            </section>

            <!-- ===== 案例管理 ===== -->
            <section id="tab-cases" class="admin-section">
                <div class="admin-page-header">
                    <div>
                        <h1>🏆 案例管理</h1>
                        <div class="admin-subtitle">管理成功案例，支持图片上传</div>
                    </div>
                    <button class="admin-btn admin-btn-primary" onclick="openAddCaseModal()">➕ 新增案例</button>
                </div>

                <div class="admin-card" id="caseListContainer">
                    <div class="admin-loading">加载中...</div>
                </div>
            </section>

            <!-- ===== 线索管理 ===== -->
            <section id="tab-leads" class="admin-section">
                <div class="admin-page-header">
                    <div>
                        <h1>📋 线索管理</h1>
                        <div class="admin-subtitle">查看客户预约信息及诊断数据</div>
                    </div>
                </div>

                <div class="admin-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
                        <div>
                            <span id="leadsCount" style="font-size:0.9rem;color:#888"></span>
                        </div>
                        <button class="admin-btn" onclick="loadLeads()">🔄 刷新</button>
                    </div>
                    <div id="leadsListContainer">
                        <div class="admin-loading">加载中...</div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- ====== Modal 通用弹窗 ====== -->
    <div class="admin-modal-overlay" id="modalOverlay">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="admin-modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <!-- 由 JS 动态填充 -->
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin-api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
